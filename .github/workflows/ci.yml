# CI (task 1.4) — cost-aware layout so the repo stays inside the free Actions tier.
#
# GitHub bills Actions minutes by runner: Linux 1x, macOS 10x. To avoid burning
# the monthly allowance on every push:
#   * The portability law (a plain grep) runs on EVERY push & PR on Linux — cheap.
#   * The full macOS suite (Swift tests + style + app build) is CONSOLIDATED into
#     ONE job and runs ONLY on pushes to main + manual dispatch — never on PRs.
# So a PR costs ~0 macOS minutes; macOS only runs when something lands on main or
# you trigger it by hand (Actions tab -> CI -> "Run workflow").
#
# Live-capture + scrolling failure suites + XCUITests run on the self-hosted Mac
# runner (design D8/D13), not here — see selfhosted.yml when task 7.8 lands.
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Cheap guard on every push & PR (Ubuntu = 1x minutes). The Core/Render
  # portability invariant is a plain grep — no toolchain, negligible cost.
  portability-lint:
    name: Portability law (OneShotCore/Render)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash Scripts/check-portability.sh

  # Expensive (macOS = 10x). One job instead of 11 (single checkout + Xcode setup
  # + SPM resolve), and only on main merges / manual dispatch — NOT on PRs.
  macos-suite:
    name: Swift tests + style + app build (macOS)
    if: github.event_name != 'pull_request'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/.swiftpm
          key: spm-${{ hashFiles('OneShotKit/**/Package.swift') }}
      - name: Package unit tests
        run: |
          set -o pipefail
          fail=0
          for p in OneShotCore OneShotRender OneShotScroll OneShotOCR \
                   OneShotLibrary OneShotDestinations OneShotLicensing OneShotInstruments; do
            echo "::group::swift test $p"
            swift test --package-path "OneShotKit/$p" || fail=1
            echo "::endgroup::"
          done
          # OneShotCapture's live tests need a real display + Screen Recording grant;
          # they belong on the self-hosted runner. Run them but don't fail CI here.
          echo "::group::swift test OneShotCapture (best-effort; live tests need self-hosted)"
          swift test --package-path OneShotKit/OneShotCapture \
            || echo "::warning::OneShotCapture live-capture tests require a real display — run on the self-hosted runner (task 1.6)."
          echo "::endgroup::"
          exit $fail
      - name: Style (SwiftFormat + SwiftLint)
        run: |
          brew install swiftformat swiftlint
          swiftformat --lint .
          swiftlint lint --strict --quiet
      - name: App target build
        run: |
          brew install xcodegen
          xcodegen generate
          xcodebuild -project OneShot.xcodeproj -scheme OneShot \
            -configuration Debug build CODE_SIGNING_ALLOWED=NO | tail -50
